name: Feature request
description: Suggest an improvement to novel-engine.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What writing workflow problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Avoid including private story material.
    validations:
      required: false
