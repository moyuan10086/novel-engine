# 悬疑题材模板

writing_rules:
  - 信息释放节奏：每章给一条线索，埋一个新疑问
  - POV 限制严格——角色不知道的，读者也不知道
  - 红鲱鱼自然融入，不刻意误导
  - 关键证据首次出现时不加强调，回溯时才显意义

style_notes:
  - 环境描写制造氛围但不过度渲染
  - 对话中的潜台词比明说更重要
  - 时间线清晰，必要时用时间标记锚定

vocabulary_hints:
  avoid:
    - 直接点明角色情绪（他感到恐惧）
    - 过早揭示动机
  prefer:
    - 感官细节暗示异常
    - 角色的微表情和不经意动作
    - 不完整的信息引发读者推理
