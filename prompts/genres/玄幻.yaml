# 玄幻题材模板 — 覆盖/扩展 base.yaml

writing_rules:
  - 战斗场面注重节奏：蓄力-碰撞-结果，不堆砌招式名
  - 修炼体系描写克制，只在关键突破时展开
  - 对话体现角色修为层次差异
  - 世界观信息通过角色认知自然带出，不用百科式介绍

style_notes:
  - 力量感来自克制的对比，而非形容词堆叠
  - 天地异象一笔带过，聚焦人物反应
  - 功法描写不超过3句，读者能想象出画面即可

vocabulary_hints:
  avoid:
    - 震惊
    - 不可思议
    - 恐怖如斯
    - 竟然
  prefer:
    - 具体的感官描写
    - 环境反应（地面龟裂、空气扭曲）
    - 旁观者的肢体语言
